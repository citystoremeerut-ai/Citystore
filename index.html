<!DOCTYPE html>
<html lang="en">
<head>

}

.card{

.qr{

h1{

h2{

}

.phone{
font-size:22px;
font-weight:bold;

.footer{

color:#666;
font-size:14px;
}
</style>

</head>
<body>

<div class="card">

</html>
